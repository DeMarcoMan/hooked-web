<!DOCTYPE html>
<html>
<head>
    <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.

      For more details:
      * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

      This is a placeholder for base href that will be replaced by the value of
      the `--base-href` argument provided to `flutter build`.
    -->
    <base href="/hooked-web/">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="Powered by DeMarcoMan">

    <!-- 👇 fix viewport to cover notch and bottom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <!-- 👇 theme color to match your app -->
    <meta name="theme-color" content="#000000">

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes">
    <!-- 👇 change to black so your color does not show through -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="hooked">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png"/>

    <title>Hooked</title>
    <link rel="manifest" href="manifest.json">

    <!-- 👇 match body background to your app color -->
    <style>
        html, body {
        background-color: #000000;
        margin: 0;
        padding: 0;
        }
    </style>
</head>
<body>
<script src="flutter_bootstrap.js" async></script>
</body>
</html>
